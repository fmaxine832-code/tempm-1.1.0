name = "temp-mail-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true
account_id = "8c9a1eeeb304099c5fb8b9c8b2f24530"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "temp-mail-db"
database_id = "4dbeaec2-650a-46c1-8569-a7633b1b5eb6"

[triggers]
crons = ["0 3 * * *"]

[vars]
# Comma-separated list of allowed frontend origins (for CORS)
ALLOWED_ORIGINS = "http://localhost:3000"
# ADMIN_PASSWORD is stored as a Wrangler secret (not in this file).
# Set it with: cd worker && npx wrangler secret put ADMIN_PASSWORD
 # 管理员密码（自己设一个强密码）
ADMIN_PASSWORD = "" 
